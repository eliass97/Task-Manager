<div class="container h-100">
    <div class="row h-100">
        <div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
            <div class="d-table-cell align-middle">

                <div class="text-center mt-4">
                    <h1 class="h2">Get started</h1>
                    <p class="lead">
                        Start creating the best possible user experience for you customers.
                    </p>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="m-sm-4">
                            <form [formGroup]="loginForm" (ngSubmit)="login()">
                                <div class="form-group">
                                    <label for="username">Username</label>
                                    <input class="form-control form-control-lg" type="text" id="username"
                                        name="username" placeholder="Enter your username"
                                        [formControlName]="'username'">
                                    <span
                                        *ngIf="!loginForm.get('username')?.valid && loginForm.get('username')?.touched">Please
                                        provide a valid username</span>
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <input class="form-control form-control-lg" type="password" id="password"
                                        name="password" placeholder="Enter your password"
                                        [formControlName]="'password'">
                                    <span
                                        *ngIf="!loginForm.get('password')?.valid && loginForm.get('password')?.touched">Please
                                        provide a valid password</span>
                                </div>
                                <div class="text-center mt-3">
                                    <button type="submit" class="btn btn-lg btn-primary">Login</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
